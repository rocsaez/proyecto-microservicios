server:
  port: 8082

spring:
  application:
    name: GESTION-PROFESOR
  
  datasource:
    url: jdbc:mysql://mysql_profesor:3306/profesores_db?createDatabaseIfNotExist=true
    username: desarrollador
    password: password_seguro_123
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  cloud:
    openfeign:
      client:
        config:
          default:
            connectTimeout: 3000
            readTimeout: 5000

# Habilitar SpringDoc y Swagger UI para Profesores
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /doc/swagger-ui.html

