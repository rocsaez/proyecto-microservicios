spring.application.name=gestion_profesor
server.port=8082

# CORREGIDO: Apuntando a la base de datos exclusiva del microservicio de profesores
spring.datasource.url=jdbc:mysql://mysql_profesor:3306/profesores_db?createDatabaseIfNotExist=true
spring.datasource.username=desarrollador
spring.datasource.password=password_seguro_123

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# --- CONFIGURACIÓN FASE 4: TIMEOUTS ---
spring.cloud.openfeign.client.config.default.connectTimeout=3000
spring.cloud.openfeign.client.config.default.readTimeout=5000

# Habilitar SpringDoc y Swagger UI para Profesores
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/doc/swagger-ui.html