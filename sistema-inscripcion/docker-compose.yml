
services:
  db-inscripcion:
    image: mysql:8.0
    container_name: mysql_inscripcion
    environment:
      MYSQL_ROOT_PASSWORD: clave_maestra_root
      MYSQL_DATABASE: universidad_backend
      MYSQL_USER: desarrollador
      MYSQL_PASSWORD: password_seguro_123
    ports:
      - "3310:3306"
    networks:
      - red_inscripcion
    volumes:
      - persistencia_db_inscripcion:/var/lib/mysql

  workspace-inscripcion:
    image: maven:3.9-eclipse-temurin-21
    container_name: entorno_inscripcion
    ports:
      - "8085:8085"
    depends_on:
      - db-inscripcion
    networks:
      - red_inscripcion
    command: tail -f /dev/null
    volumes:
      - ./codigo-fuente:/app

networks:
  red_inscripcion:
    driver: bridge

volumes:
  persistencia_db_inscripcion: