services:
  db-inscripcion:
    image: mysql:8.0
    container_name: mysql_inscripcion
    environment:
      MYSQL_ROOT_PASSWORD: clave_maestra_root
      MYSQL_DATABASE: inscripciones_db
      MYSQL_USER: desarrollador
      MYSQL_PASSWORD: password_seguro_123
    ports:
      - "3310:3306"
    networks:
      - red_inscripcion
      - red_universidad
    volumes:
      - persistencia_db_inscripcion:/var/lib/mysql

  workspace-inscripcion:
    image: maven:3.9-eclipse-temurin-21
    container_name: entorno_inscripcion
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql_inscripcion:3306/inscripciones_db?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false
      - ESTUDIANTES_URL=http://entorno_estudiante:8081
      - ASIGNATURAS_URL=http://entorno_asignaturas:8080
    ports:
      - "8085:8085"
    depends_on:
      - db-inscripcion
    networks:
      - red_inscripcion
      - red_universidad
    # 💡 Reducido a 15 segundos para agilizar el arranque
    command: bash -c "sleep 15; mvn spring-boot:run -Dmaven.test.skip=true -DskipTests"
    volumes:
      - .:/app
    working_dir: /app

networks:
  red_inscripcion:
    driver: bridge
  red_universidad:
    external: true
    name: proyecto_red_universidad  # 👈 Enlazado a tu red común de AWS

volumes:
  persistencia_db_inscripcion: