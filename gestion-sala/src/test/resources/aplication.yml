spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: false

  cloud:
    compatibility-verifier:
      enabled: false

# URLs ficticias de respaldo durante tests
asistencia:
  service:
    url: http://localhost:8080
estudiantes:
  service:
    url: http://localhost:8081

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

eureka:
  client:
    enabled: false