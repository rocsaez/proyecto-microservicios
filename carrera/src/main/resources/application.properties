spring.application.name=carrera
server.port=8089

# Configuración de conexión flexible (Estilo del Profesor)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/carrera_db?createDatabaseIfNotExist=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuración de Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Desactivar el verificador estricto de versiones de Spring Cloud
spring.cloud.compatibility-verifier.enabled=false

# --- CONFIGURACIÓN FASE 4: TIMEOUTS ---
spring.cloud.openfeign.client.config.default.connectTimeout=3000
spring.cloud.openfeign.client.config.default.readTimeout=5000

# --- CONFIGURACIÓN FASE 3: SWAGGER ---
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/doc/swagger-ui.html