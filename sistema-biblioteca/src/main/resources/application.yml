server:
  port: 8083

spring:
  application:
    name: SISTEMA-BIBLIOTECA
  
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://mysql_biblioteca:3306/biblioteca_db?createDatabaseIfNotExist=true}
    username: ${SPRING_DATASOURCE_USERNAME:desarrollador}
    password: ${SPRING_DATASOURCE_PASSWORD:password_seguro_123}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  cloud:
    openfeign:
      client:
        config:
          default:
            connectTimeout: 3000
            readTimeout: 5000

logging:
  level:
    cl:
      duoc:
        sistema_biblioteca: INFO

# Configuración Swagger / OpenAPI
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /doc/swagger-ui.html

# Conexiones Feign existentes
estudiantes:
  service:
    url: http://entorno_programacion1:8081


eureka:
  client:
    service-url:
      defaultZone: http://3.86.130.217:8761/eureka/
  instance:
    prefer-ip-address: true
    ip-address: 54.91.52.2