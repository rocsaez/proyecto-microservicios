services:
  db-estudiante:
    image: mysql:8.0
    container_name: mysql_estudiante
    environment:
      MYSQL_ROOT_PASSWORD: clave_maestra_root
      MYSQL_DATABASE: estudiantes_db
      MYSQL_USER: desarrollador
      MYSQL_PASSWORD: password_seguro_123
    ports:
      - "3311:3306"  # Puerto expuesto para evitar colisiones
    networks:
      - red_estudiante
      - red_universidad
    volumes:
      - persistencia_db_estudiante:/var/lib/mysql

  workspace-estudiante:
    image: maven:3.9-eclipse-temurin-21
    container_name: entorno_estudiante
    ports:
      - "8081:8081"
    depends_on:
      - db-estudiante
    networks:
      - red_estudiante
      - red_universidad
    command: bash -c "sleep 15; mvn spring-boot:run -Dmaven.test.skip=true -DskipTests"
    volumes:
      - ./:/app
    working_dir: /app

networks:
  red_estudiante:
    driver: bridge
  red_universidad:
    external: true
    name: proyecto_red_universidad  # Conectado a la red global de tus otros servicios

volumes:
  persistencia_db_estudiante: