services:
  # ------------------------------------------------------------------
  # CONTENEDOR 1: LA BASE DE DATOS MYSQL PARA EL SISTEMA DE BECAS
  # ------------------------------------------------------------------
  db-beca:
    image: mysql:8.0
    container_name: mysql_beca
    environment:
      MYSQL_ROOT_PASSWORD: clave_maestra_root
      MYSQL_DATABASE: becas_db  # <-- CORREGIDO: Base de datos única
      MYSQL_USER: desarrollador
      MYSQL_PASSWORD: password_seguro_123
    ports:
      - "3311:3306"
    networks:
      - red_becas
    volumes:
      - persistencia_db_beca:/var/lib/mysql

  # ------------------------------------------------------------------
  # CONTENEDOR 2: EL ENTORNO DE TRABAJO JAVA/SPRING BOOT
  # ------------------------------------------------------------------
  workspace-beca:
    image: maven:3.9-eclipse-temurin-21
    container_name: entorno_beca
    ports:
      - "8086:8086"
    depends_on:
      - db-beca
    networks:
      - red_becas
    command: tail -f /dev/null
    volumes:
      - ./src:/app/src
      - ./pom.xml:/app/pom.xml

networks:
  red_becas:
    driver: bridge

volumes:
  persistencia_db_beca: