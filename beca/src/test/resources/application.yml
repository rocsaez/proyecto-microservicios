spring:
  datasource:
    url: jdbc:h2:mem:becas_testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: false

  cloud:
    compatibility-verifier:
      enabled: false

# Propiedad para la URL de Feign ficticia durante pruebas
app:
  estudiante-service:
    url: http://localhost:8081

# Desactivar Swagger en tests
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false