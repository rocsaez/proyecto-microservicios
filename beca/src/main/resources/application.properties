spring.application.name=beca
server.port=8086

# Configuración de base de datos Dockerizada propia
spring.datasource.url=jdbc:mysql://mysql_beca:3306/becas_db?createDatabaseIfNotExist=true
spring.datasource.username=desarrollador
spring.datasource.password=password_seguro_123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuración de Hibernate alineada al profesor
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

logging.level.cl.duoc.beca=INFO

# Swagger UI / OpenAPI (Agregado del Profesor)
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/doc/swagger-ui.html

# --- CONFIGURACIÓN FASE 4: TIMEOUTS ---
spring.cloud.openfeign.client.config.default.connectTimeout=3000
spring.cloud.openfeign.client.config.default.readTimeout=5000