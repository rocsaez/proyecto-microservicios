server:
  port: 8080

spring:
  application:
    name: ASIGNATURAS 
  
  datasource:
    url: jdbc:mysql://mysql_asignaturas:3306/asignaturas_db?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false
    username: desarrollador
    password: password_seguro_123
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  cloud:
    compatibility-verifier: { enabled: false }
    openfeign:
      client:
        config:
          default:
            connectTimeout: 3000
            readTimeout: 5000


profesores:
  service:
    url: http://entorno_profesor:8082
carrera:
  service:
    url: http://entorno_carrera:8089

# Habilitar SpringDoc y Swagger UI
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /doc/swagger-ui.html

eureka:
  client:
    service-url:
      defaultZone: http://3.86.130.217:8761/eureka/  # Tu IP de Eureka remota
  instance:
    prefer-ip-address: true  