spring.application.name=asignaturas
server.port=8080

# CORREGIDO: Añadiendo el permiso para recuperar la clave pública de seguridad
spring.datasource.url=jdbc:mysql://mysql_asignaturas:3306/asignaturas_db?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=desarrollador
spring.datasource.password=password_seguro_123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Conexiones Feign
profesores.service.url=http://entorno_profesor:8082
carrera.service.url=http://entorno_carrera:8089

# --- CONFIGURACIÓN FASE 4: TIMEOUTS ---
spring.cloud.openfeign.client.config.default.connectTimeout=3000
spring.cloud.openfeign.client.config.default.readTimeout=5000

# Habilitar SpringDoc y Swagger UI para Asignaturas
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/doc/swagger-ui.html

# Desactivar el verificador estricto de versiones de Spring Cloud
spring.cloud.compatibility-verifier.enabled=false