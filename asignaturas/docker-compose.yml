version: '3.8'

services:
  db-asignaturas:
    image: mysql:8.0
    container_name: mysql_asignaturas
    environment:
      MYSQL_ROOT_PASSWORD: clave_maestra_root
      MYSQL_DATABASE: asignaturas_db
      MYSQL_USER: desarrollador
      MYSQL_PASSWORD: password_seguro_123
    ports:
      - "3314:3306"
    networks:
      - red_universidad
    volumes:
      - persistencia_db_asignaturas:/var/lib/mysql

  workspace-asignaturas:
    image: maven:3.9-eclipse-temurin-21
    container_name: entorno_asignaturas
    ports:
      - "8080:8080"
    depends_on:
      - db-asignaturas
    networks:
      - red_universidad
    command: bash -c "sleep 15; mvn spring-boot:run -Dmaven.test.skip=true -DskipTests"
    volumes:
      - ./:/app
    working_dir: /app

networks:
  red_universidad:
    external: true
    name: proyecto_red_universidad
    

volumes:
  persistencia_db_asignaturas: