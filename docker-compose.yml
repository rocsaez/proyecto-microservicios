      - "3306:3306"
    volumes:
      - persistencia_db_estudiantes:/var/lib/mysql
    networks:
      - red_estudiantes

  ms-estudiantes:
    build: ./estudiantes
    container_name: ms-estudiantes
    ports:
      - "8081:8081"
    depends_on:
      - db-estudiantes
    networks:
      - red_estudiantes

