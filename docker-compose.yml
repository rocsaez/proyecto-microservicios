version: '3.8'

x-mysql-env: &mysql_env
  MYSQL_ROOT_PASSWORD: clave_maestra_root
  MYSQL_USER: desarrollador
  MYSQL_PASSWORD: password_seguro_123

services:
  
  # --- MÓDULO ESTUDIANTES ---
  db-estudiantes:
    image: mysql:8.0
    container_name: mysql_estudiantes  
    environment:
      <<: *mysql_env
      MYSQL_DATABASE: estudiantes_db
    ports: ["3306:3306"]
    networks:
      red_estudiantes:
        aliases:
          - mysql_servidor 
    volumes: [persistencia_db_estudiantes:/var/lib/mysql]
  workspace-java: 
    image: maven:3.9-eclipse-temurin-21
    container_name: entorno_programacion1
    ports: ["8081:8081"]
    depends_on: [db-estudiantes]
    networks: [red_estudiantes, red_universidad]
    environment:
      - SPRING_CLOUD_INETUTILS_PREFERRED_NETWORKS=red_universidad
    command: bash -c "sleep 60; mvn spring-boot:run -Dmaven.test.skip=true -DskipTests"
    volumes: ["./gestion-estudiante:/app"]
    working_dir: /app

  # --- MÓDULO PROFESORES ---
  db-profesor:
    image: mysql:8.0
    container_name: mysql_profesor
