# DEFINICIÓN GLOBAL DE REDES Y VOLÚMENES
networks:
  red_asignaturas:
    driver: bridge
  red_estudiantes:
    driver: bridge
  red_profesores:
    driver: bridge
  red_evaluacion:
    driver: bridge
  red_carrera:
    driver: bridge
  red_pagos:
    driver: bridge
  red_biblioteca:
    driver: bridge
  red_inscripciones:
    driver: bridge
  red_becas:
    driver: bridge
  red_salas:
    driver: bridge
  red_asistencia:
    driver: bridge

volumes:
  persistencia_db_asignaturas:
  persistencia_db_estudiantes:
  persistencia_db_profesores:
  persistencia_db_evaluacion:
  persistencia_db_carrera:
  persistencia_db_pagos:
  persistencia_db_biblioteca:
  persistencia_db_inscripciones:
  persistencia_db_becas:
  persistencia_db_salas:
  persistencia_db_asistencia: