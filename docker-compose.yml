version: '3.8'

services:
  # --- MÓDULO ASIGNATURAS ---
  db-asignaturas:
    image: mysql:8
    container_name: db-asignaturas
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: universidad_backend
    ports:
      - "3314:3306"
    volumes:
      - persistencia_db_asignaturas:/var/lib/mysql
    networks:
      - red_asignaturas

  ms-asignaturas:
    build: ./asignaturas
    container_name: ms-asignaturas
    ports:
      - "8080:8080"
    depends_on:
      - db-asignaturas
    networks:
      - red_asignaturas

  # --- MÓDULO ESTUDIANTES ---
  db-estudiantes:
    image: mysql:8
    container_name: db-estudiantes
    environment:
      MYSQL_ROOT_PASSWORD: root
