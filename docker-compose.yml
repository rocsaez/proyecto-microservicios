      <<: *mysql_env
      MYSQL_DATABASE: profesores_db
    ports: ["3307:3306"]
    networks: [red_profesores]
    volumes: [persistencia_db_profesor:/var/lib/mysql]

  workspace-profesor:
    image: maven:3.9-eclipse-temurin-21
    container_name: entorno_profesor
