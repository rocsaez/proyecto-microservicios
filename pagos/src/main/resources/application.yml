server:
  port: 8090

spring:
  application:
    name: MS-PAGOS
  
  datasource:
    
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://mysql_pagos:3306/pagos_db?createDatabaseIfNotExist=true}
    username: ${SPRING_DATASOURCE_USERNAME:desarrollador}
    password: ${SPRING_DATASOURCE_PASSWORD:password_seguro_123}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

  cloud:
    compatibility-verifier:
      enabled: false
    openfeign:
      client:
        config:
          default:
            connectTimeout: 3000
            readTimeout: 5000

logging:
  level:
    cl:
      duoc:
        pagos: INFO

# Conexiones Dinámicas Feign mediante properties
estudiantes:
  service:
    url: ${ESTUDIANTES_SERVICE_URL:http://localhost:8081}
becas:
  service:
    url: ${BECAS_SERVICE_URL:http://localhost:8086}

# Swagger UI / OpenAPI de la Asignatura
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /doc/swagger-ui.html

# Registro en tu Eureka de AWS
eureka:
  client:
    service-url:
      defaultZone: http://3.86.130.217:8761/eureka/
  instance:
    prefer-ip-address: true
    ip-address: 54.91.52.2